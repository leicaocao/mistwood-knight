<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#142b22" />
    <meta name="description" content="雾林骑士：一个可移动骑士与低多边形森林的 Three.js 测试场景。" />
    <title>雾林骑士</title>
    <link rel="stylesheet" href="./styles.css?v=5" />
    <script defer src="./game.js?v=13"></script>
  </head>
  <body>
    <main class="game-shell">
      <div id="scene" class="scene" aria-label="可移动骑士的 Three.js 森林场景"></div>

      <header class="game-header">
        <div>
          <p class="eyebrow">THREE.JS FOREST STUDY</p>
          <h1>雾林骑士</h1>
        </div>
        <div class="hud-status">
          <button id="world-toggle" class="world-state" type="button" title="切换昼夜（N）">
            <span id="world-icon" class="world-icon">☀</span>
            <span><strong id="world-label">白昼 · 低攻击性</strong><small id="world-clock">12:00</small></span>
          </button>
          <div class="status"><span></span><strong id="motion">待命</strong></div>
        </div>
      </header>

      <div id="threat-banner" class="threat-banner">夜幕降临 · 骷髅已狂暴</div>

      <button id="town-upgrade" class="town-upgrade" type="button" disabled>
        <span>城镇中心</span>
        <strong id="town-level">建造中</strong>
        <small id="town-action">U · 升级</small>
      </button>

      <aside class="instructions">
        <p>探索林间空地</p>
        <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><span>移动</span></div>
        <div><kbd>⇧</kbd><span>按住奔跑</span></div>
        <div><kbd>N</kbd><span>切换昼夜</span></div>
        <div><kbd>J</kbd><span>攻击 / 左键</span></div>
        <div><kbd>U</kbd><span>升级城镇中心</span></div>
      </aside>

      <div id="loading" class="loading" role="status">
        <div class="loading-card">
          <div class="crest">♞</div>
          <p id="loading-text">正在进入森林</p>
          <div class="loading-progress"><span id="loading-progress"></span></div>
          <small id="loading-detail">准备 3D 模型</small>
        </div>
      </div>

      <div class="touch-controls" aria-label="触控移动按钮">
        <button class="up" type="button" data-key="forward" aria-label="向前">▲</button>
        <button class="left" type="button" data-key="left" aria-label="向左">◀</button>
        <button class="down" type="button" data-key="back" aria-label="向后">▼</button>
        <button class="right" type="button" data-key="right" aria-label="向右">▶</button>
        <button class="sprint" type="button" data-key="run" aria-label="奔跑">跑</button>
        <button class="attack" id="attack-button" type="button" aria-label="攻击">剑</button>
      </div>

      <footer class="credit">Three.js · KayKit CC0 骑士、骷髅与骨骼动画</footer>
    </main>
  </body>
</html>
